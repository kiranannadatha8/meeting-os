services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: meetingos-postgres
    environment:
      POSTGRES_USER: meetingos
      POSTGRES_PASSWORD: meetingos
      POSTGRES_DB: meetingos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetingos"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meetingos-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
